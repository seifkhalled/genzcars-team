name: cars

version: "3.9"

networks:
  cars_net:
    driver: bridge

services:

  # ── BACKEND — FastAPI ──────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cars_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    networks:
      - cars_net
    volumes:
      - ../backend:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── CHATBOT — LangGraph + Groq ────────────────────────────────
  chatbot:
    build:
      context: ../chatbot
      dockerfile: Dockerfile
    container_name: cars_chatbot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      CHATBOT_PORT: 8001
    ports:
      - "8001:8001"
    networks:
      - cars_net
    volumes:
      - ../chatbot:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy

  # ── COMPARISON ANALYSIS ────────────────────────────────────────
  comparison:
    build:
      context: ../Comparison_Analysis
      dockerfile: Dockerfile
    container_name: cars_comparison
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      COMPARISON_PORT: 8002
    ports:
      - "8002:8002"
    networks:
      - cars_net
    volumes:
      - ../Comparison_Analysis:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy

  # ── FRONTEND — Next.js ─────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cars_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost
      NODE_ENV: development
    ports:
      - "3000:3000"
    networks:
      - cars_net
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy

  # ── NGINX — reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cars_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - cars_net
    depends_on:
      - frontend
      - backend
      - chatbot
      - comparison

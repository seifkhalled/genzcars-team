name: cars

networks:
  cars_net:
    driver: bridge

services:

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: cars_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    networks:
      - cars_net
    volumes:
      - ./Backend:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  chatbot:
    build:
      context: ./Chatbot
      dockerfile: Dockerfile
    container_name: cars_chatbot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      CHATBOT_PORT: 8001
    ports:
      - "8001:8001"
    networks:
      - cars_net
    volumes:
      - ./Chatbot:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy

  comparison:
    build:
      context: ./Comparison_Analysis
      dockerfile: Dockerfile
    container_name: cars_comparison
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      COMPARISON_PORT: 8002
    ports:
      - "8002:8002"
    networks:
      - cars_net
    volumes:
      - ./Comparison_Analysis:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: cars_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost
      NODE_ENV: development
    ports:
      - "3000:3000"
    networks:
      - cars_net
    volumes:
      - ./Frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: cars_nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - cars_net
    depends_on:
      - frontend
      - backend
      - chatbot
      - comparison

  redis:
    image: redis:alpine
    container_name: cars_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - cars_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: cars_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - cars_net
    depends_on:
      - backend
      - chatbot
      - comparison

  grafana:
    image: grafana/grafana:latest
    container_name: cars_grafana
    restart: unless-stopped
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - cars_net
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    container_name: cars_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    networks:
      - cars_net
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: cars_promtail
    restart: unless-stopped
    volumes:
      - ./infra/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cars_net
    command: -config.file=/etc/promtail/promtail.yml
